services:
  postgres:
    image: postgres:16-alpine
    container_name: aurora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aurora
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aurora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../internal/adapter/postgres/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aurora-net

  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aurora-net

  aurora-backend:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: aurora-backend
    restart: unless-stopped
    environment:
      CONFIG_PATH: /app/configs/config.yaml
      AURORA_DATABASE_HOST: postgres
      AURORA_DATABASE_PORT: 5432
      AURORA_REDIS_HOST: redis
      AURORA_REDIS_PORT: 6379
    env_file:
      - ../.env
    volumes:
      - ../configs:/app/configs:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aurora-net

networks:
  aurora-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
